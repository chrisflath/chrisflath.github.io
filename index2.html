<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pipe Builder</title>
<style>
body { font-family: sans-serif; text-align: center; background:#f4f4f4; }
#grid { display: grid; grid-template-columns: repeat(10,40px); gap:2px; margin:20px auto; width:max-content; }
.cell {
  width:40px; height:40px;
  background:white;
  border:1px solid #ccc;
  font-size:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
#next { margin-top:10px; font-size:20px; }
</style>
</head>
<body>

<h2>Pipe Builder</h2>
<div id="grid"></div>
<div id="next">Next: </div>

<script>
const rows = 8;
const cols = 10;
const grid = document.getElementById("grid");
const nextDiv = document.getElementById("next");

const pieces = ["─","│","┌","┐","└","┘"];
let queue = [];

function randomPiece() {
  return pieces[Math.floor(Math.random()*pieces.length)];
}

function refillQueue() {
  while(queue.length < 3) {
    queue.push(randomPiece());
  }
  renderQueue();
}

function renderQueue() {
  nextDiv.textContent = "Next: " + queue.join(" ");
}

function placePiece(cell) {
  if (cell.textContent !== "") return;
  cell.textContent = queue.shift();
  refillQueue();
}

function createGrid() {
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.addEventListener("click", () => placePiece(cell));
      grid.appendChild(cell);
    }
  }
}

createGrid();
refillQueue();
</script>

</body>
</html>
